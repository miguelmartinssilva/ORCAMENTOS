<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin | Miguel Martins</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
  <header class="admin-header">
    <div>
      <div class="eyebrow">Painel administrativo</div>
      <h1 class="admin-title">Miguel <span>Martins</span></h1>
    </div>
    <button id="logout-btn" class="btn-admin btn-danger">Sair</button>
  </header>

  <main class="admin-wrap">
    <section class="admin-card">
      <h2>Atalhos</h2>
      <div class="admin-grid">
        <a class="admin-link" href="index.html">Abrir orçamento</a>
        <a class="admin-link" href="historico.html">Abrir histórico</a>
      </div>
    </section>

    <section class="admin-card">
      <h2>Alterar login</h2>
      <div class="fg">
        <label class="lbl">Novo usuário</label>
        <input type="text" id="new-user" placeholder="Novo usuário">
      </div>
      <div class="fg">
        <label class="lbl">Nova senha</label>
        <input type="password" id="new-pass" placeholder="Nova senha">
      </div>
      <button id="save-login" class="btn-admin btn-main">Salvar novo login</button>
      <p id="save-msg" class="login-msg ok"></p>
    </section>

    <section class="admin-card">
      <h2>Resumo</h2>
      <div id="stats" class="stats-box"></div>
    </section>

    <section class="admin-card">
      <h2>Gerenciar Serviços</h2>
      <div id="admin-servicos-lista" style="display:grid;gap:8px;margin-bottom:12px"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn-admin btn-main" onclick="novoServico()">+ Novo serviço</button>
        <button class="btn-admin btn-main" onclick="salvarAdminServicos()">Salvar alterações</button>
      </div>
      <p id="srv-msg" class="login-msg ok" style="margin-top:8px"></p>
    </section>

    <section class="admin-card">
      <h2>Gerenciar Pacotes</h2>
      <div id="admin-pacotes-lista" style="display:grid;gap:10px;margin-bottom:12px"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn-admin btn-main" onclick="novoPacote()">+ Novo pacote</button>
        <button class="btn-admin btn-main" onclick="salvarAdminPacotes()">Salvar alterações</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
  <script src="admin.js"></script>
  





<nav class="bottom-nav">
  <a class="bn-item " href="index.html">
    <span class="bn-icon">🏠</span>
    <span class="bn-lbl">Início</span>
  </a>
  <a class="bn-item " href="pacotes.html">
    <span class="bn-icon">📦</span>
    <span class="bn-lbl">Pacotes</span>
  </a>
  <a class="bn-item " href="historico.html">
    <span class="bn-icon">📚</span>
    <span class="bn-lbl">Histórico</span>
  </a>
  <a class="bn-item ativo" href="admin.html">
    <span class="bn-icon">⚙️</span>
    <span class="bn-lbl">Admin</span>
  </a>
</nav>
</body>
</html>
